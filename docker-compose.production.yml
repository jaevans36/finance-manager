# Life Manager — Production Docker Compose
#
# Runs the full stack: PostgreSQL + .NET API + React frontend (nginx)
#
# FIRST TIME SETUP:
#   1. cp .env.production.example .env.production
#   2. Edit .env.production — set DB_PASSWORD and JWT_SECRET
#   3. docker compose -f docker-compose.production.yml --env-file .env.production up -d --build
#
# SUBSEQUENT STARTS (no code changes):
#   docker compose -f docker-compose.production.yml --env-file .env.production up -d
#
# UPDATE TO LATEST CODE:
#   git pull && docker compose -f docker-compose.production.yml --env-file .env.production up -d --build
#
# ACCESS:
#   Frontend: http://localhost
#   API:      http://localhost:5000
#   Health:   http://localhost:5000/api/health

services:
  postgres:
    image: postgres:15-alpine
    container_name: life-manager-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-life_manager}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-life_manager_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-life_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - life-manager
    # Postgres is intentionally NOT exposed to the host —
    # only the API container connects to it via the internal network.

  api:
    build:
      context: .
      dockerfile: apps/finance-api/Dockerfile
    container_name: life-manager-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${DB_NAME:-life_manager_prod};Username=${DB_USER:-life_manager};Password=${DB_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      Cors__AllowedOrigins__0: "http://localhost"
      Cors__AllowedOrigins__1: ${FRONTEND_ORIGIN:-http://localhost:80}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - life-manager

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Change to your machine's hostname or IP for LAN access from other devices:
        #   VITE_API_URL: http://192.168.1.100:5000
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    container_name: life-manager-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - life-manager

networks:
  life-manager:
    driver: bridge

volumes:
  postgres_data:
    driver: local
