name: CI

on:
  push:
    branches: [main, develop, 'phase-*/**', 'phase-*']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: |
          dotnet restore apps/life-api/LifeApi.csproj
          dotnet restore apps/life-api-tests/LifeApi.UnitTests/LifeApi.UnitTests.csproj
          dotnet restore apps/life-api-tests/LifeApi.IntegrationTests/LifeApi.IntegrationTests.csproj

      - name: Run unit tests
        run: >
          dotnet test
          apps/life-api-tests/LifeApi.UnitTests/LifeApi.UnitTests.csproj
          --no-restore
          --configuration Release
          --logger "trx;LogFileName=unit-results.trx"
          --results-directory TestResults

      - name: Run integration tests
        run: >
          dotnet test
          apps/life-api-tests/LifeApi.IntegrationTests/LifeApi.IntegrationTests.csproj
          --no-restore
          --configuration Release
          --logger "trx;LogFileName=integration-results.trx"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: TestResults/

  frontend-tests:
    name: Frontend Tests (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @life-manager/schema build

      - name: Run frontend tests
        working-directory: apps/web
        run: pnpm exec jest --passWithNoTests

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: apps/web/coverage/

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @life-manager/schema build

      - name: Lint frontend
        working-directory: apps/web
        run: pnpm lint

      - name: Type check frontend
        working-directory: apps/web
        run: pnpm typecheck

      - name: Restore .NET dependencies
        run: dotnet restore apps/life-api/LifeApi.csproj

      - name: Build API (type check via dotnet build)
        run: dotnet build apps/life-api/LifeApi.csproj --configuration Release --no-restore

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @life-manager/schema build

      - name: Validate production compose file
        run: docker compose -f docker-compose.production.yml config --quiet

      - name: Restore .NET dependencies
        run: dotnet restore apps/life-api/LifeApi.csproj

      - name: Publish API
        run: >
          dotnet publish apps/life-api/LifeApi.csproj
          --configuration Release
          --no-restore
          --output apps/life-api/publish

      - name: Build frontend
        working-directory: apps/web
        env:
          VITE_API_URL: https://localhost
        run: pnpm build

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: apps/life-api/publish/
          retention-days: 7

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 7
