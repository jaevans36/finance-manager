name: Nightly Tests

on:
  schedule:
    # Run at 1:00 AM UTC daily (8:00 PM EST / 6:00 AM GMT)
    - cron: '0 1 * * *'
  workflow_dispatch: # Allow manual triggering for testing

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extended-e2e:
    name: Extended E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: finance_manager_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install chromium

      - name: Build shared packages
        run: pnpm --filter @finance-manager/schema build

      - name: Run database migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/finance_manager_test
        run: pnpm prisma migrate deploy

      - name: Start API server
        working-directory: apps/api
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:password@localhost:5432/finance_manager_test
          JWT_SECRET: test-secret-key-nightly
          JWT_REFRESH_SECRET: test-refresh-secret-key-nightly
          PORT: 3000
        run: |
          pnpm start &
          echo $! > api.pid
          sleep 10

      - name: Run extended E2E tests
        working-directory: apps/web
        env:
          CI: true
        run: pnpm test:e2e --project=extended

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-extended-results
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 30

      - name: Stop API server
        if: always()
        run: |
          if [ -f apps/api/api.pid ]; then
            kill $(cat apps/api/api.pid) || true
          fi

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run performance tests
        working-directory: apps/web
        run: pnpm test tests/performance/

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: apps/web/coverage/
          retention-days: 30

  accessibility-audit:
    name: Accessibility Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: finance_manager_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @finance-manager/schema build

      - name: Run database migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/finance_manager_test
        run: pnpm prisma migrate deploy

      - name: Start API server
        working-directory: apps/api
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:password@localhost:5432/finance_manager_test
          JWT_SECRET: test-secret-key-nightly
          JWT_REFRESH_SECRET: test-refresh-secret-key-nightly
        run: |
          pnpm start &
          echo $! > api.pid
          sleep 10

      - name: Start web server
        working-directory: apps/web
        run: |
          pnpm dev &
          echo $! > web.pid
          sleep 15

      - name: Run accessibility tests with axe
        run: |
          pnpm add -D @axe-core/cli
          pnpm exec axe http://localhost:5173 --exit

      - name: Stop servers
        if: always()
        run: |
          [ -f apps/api/api.pid ] && kill $(cat apps/api/api.pid) || true
          [ -f apps/web/web.pid ] && kill $(cat apps/web/web.pid) || true

  security-scan:
    name: Security & Dependency Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for outdated dependencies
        run: pnpm outdated || true

      - name: Upload security results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            audit-results.txt
          retention-days: 30

  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web application
        working-directory: apps/web
        run: pnpm build

      - name: Analyze bundle size
        working-directory: apps/web
        run: |
          echo "## Bundle Size Report" > bundle-report.txt
          echo "" >> bundle-report.txt
          du -sh dist/ >> bundle-report.txt
          echo "" >> bundle-report.txt
          echo "### Detailed Breakdown" >> bundle-report.txt
          find dist/ -type f -name "*.js" -exec du -h {} \; | sort -rh >> bundle-report.txt

      - name: Upload bundle analysis
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-report
          path: apps/web/bundle-report.txt
          retention-days: 30

  create-issue-on-failure:
    name: Create Issue on Failure
    needs: [extended-e2e, performance-tests, accessibility-audit, security-scan, bundle-size]
    runs-on: ubuntu-latest
    if: failure()

    permissions:
      issues: write

    steps:
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = [
              { name: 'Extended E2E Tests', result: '${{ needs.extended-e2e.result }}' },
              { name: 'Performance Tests', result: '${{ needs.performance-tests.result }}' },
              { name: 'Accessibility Audit', result: '${{ needs.accessibility-audit.result }}' },
              { name: 'Security Scan', result: '${{ needs.security-scan.result }}' },
              { name: 'Bundle Size Check', result: '${{ needs.bundle-size.result }}' }
            ];
            
            const failedJobs = jobs.filter(job => job.result === 'failure');
            const failedNames = failedJobs.map(job => job.name).join(', ');
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Nightly] Test Failure: ${failedNames}`,
              body: `## Nightly Test Failure Report
            
            **Date**: ${new Date().toISOString()}
            **Branch**: ${context.ref}
            **Commit**: ${context.sha.substring(0, 7)}
            **Workflow Run**: [View Details](${context.payload.repository.html_url}/actions/runs/${context.runId})
            
            ### Failed Jobs
            ${failedJobs.map(job => `- ❌ ${job.name}`).join('\n')}
            
            ### Action Required
            - [ ] Review workflow logs
            - [ ] Investigate root cause
            - [ ] Fix issue or update test
            - [ ] Verify fix with manual workflow run
            - [ ] Close this issue
            
            ---
            *Auto-generated by Nightly Test Suite*`,
              labels: ['test-failure', 'nightly', 'automated']
            });
            
            console.log(`Created issue #${issue.data.number}`);

  summary:
    name: Test Summary
    needs: [extended-e2e, performance-tests, accessibility-audit, security-scan, bundle-size]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Nightly Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "- Extended E2E: ${{ needs.extended-e2e.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Performance: ${{ needs.performance-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Accessibility: ${{ needs.accessibility-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Bundle Size: ${{ needs.bundle-size.result }}" >> $GITHUB_STEP_SUMMARY
