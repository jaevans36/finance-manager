name: Nightly

on:
  schedule:
    # 01:00 UTC daily
    - cron: '0 1 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-test-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @life-manager/schema build

      - name: Restore .NET dependencies
        run: dotnet restore apps/finance-api/FinanceApi.csproj

      - name: Run unit tests
        run: >
          dotnet test
          apps/finance-api-tests/FinanceApi.UnitTests/FinanceApi.UnitTests.csproj
          --no-restore
          --configuration Release
          --logger "trx;LogFileName=unit-results.trx"
          --results-directory TestResults
          --collect:"XPlat Code Coverage"
          --settings apps/finance-api-tests/coverlet.runsettings

      - name: Run integration tests
        run: >
          dotnet test
          apps/finance-api-tests/FinanceApi.IntegrationTests/FinanceApi.IntegrationTests.csproj
          --no-restore
          --configuration Release
          --logger "trx;LogFileName=integration-results.trx"
          --results-directory TestResults

      - name: Run frontend tests
        working-directory: apps/web
        run: pnpm test --passWithNoTests --coverage

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-results
          path: |
            TestResults/
            apps/web/coverage/
          retention-days: 30

  security-scan:
    name: Security & Dependency Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Check for vulnerable NuGet packages
        run: dotnet list "Finance Manager.sln" package --vulnerable --include-transitive
        continue-on-error: true

  bundle-size:
    name: Bundle Size Report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @life-manager/schema build

      - name: Build frontend
        working-directory: apps/web
        env:
          VITE_API_URL: https://localhost
        run: pnpm build

      - name: Report bundle size
        working-directory: apps/web
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total dist size**: $(du -sh dist/ | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### JS chunks (largest first)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find dist/assets -name "*.js" -exec du -h {} \; | sort -rh | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload bundle report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-report
          path: apps/web/dist/
          retention-days: 30

  create-issue-on-failure:
    name: Create Issue on Failure
    needs: [full-test-suite, security-scan, bundle-size]
    runs-on: ubuntu-latest
    if: failure()

    permissions:
      issues: write

    steps:
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = [
              { name: 'Full Test Suite', result: '${{ needs.full-test-suite.result }}' },
              { name: 'Security Scan',   result: '${{ needs.security-scan.result }}' },
              { name: 'Bundle Size',     result: '${{ needs.bundle-size.result }}' },
            ];
            const failed = jobs.filter(j => j.result === 'failure');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Nightly] Failure: ${failed.map(j => j.name).join(', ')}`,
              body: [
                '## Nightly Test Failure',
                '',
                `**Date**: ${new Date().toISOString()}`,
                `**Commit**: ${context.sha.substring(0, 7)}`,
                `**Run**: ${context.payload.repository.html_url}/actions/runs/${context.runId}`,
                '',
                '### Failed jobs',
                ...failed.map(j => `- ${j.name}`),
                '',
                '### Action required',
                '- [ ] Review workflow logs',
                '- [ ] Fix root cause',
                '- [ ] Verify with manual run',
                '- [ ] Close this issue',
              ].join('\n'),
              labels: ['test-failure', 'nightly', 'automated'],
            });

  summary:
    name: Summary
    needs: [full-test-suite, security-scan, bundle-size]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Write summary
        run: |
          echo "## Nightly Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Full Test Suite | ${{ needs.full-test-suite.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan   | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle Size     | ${{ needs.bundle-size.result }} |" >> $GITHUB_STEP_SUMMARY
