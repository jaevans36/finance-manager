name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Post-release tasks (only run when a release is actually created)
  post-release:
    name: Post-Release Verification
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Display release info
        run: |
          echo "✅ Release ${{ needs.release-please.outputs.tag_name }} created successfully"
          echo "Version: ${{ needs.release-please.outputs.version }}"
          echo ""
          echo "Next steps:"
          echo "  1. Deploy to UAT: ./scripts/deploy-uat.ps1"
          echo "  2. Run smoke tests against UAT"
          echo "  3. Update VERSION.json metadata (codename, description, changelog array)"
